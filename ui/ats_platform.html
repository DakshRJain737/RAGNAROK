<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAGnarok ATS — Intelligent Candidate Ranking Platform</title>
  <meta name="description" content="Enterprise-grade AI-powered Applicant Tracking System with intelligent candidate ranking, trust layer analysis, and multi-path retrieval scoring." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── RESET & ROOT ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white: #ffffff;
      --bg: #f7f8fc;
      --bg2: #eef0f8;
      --surface: #ffffff;
      --surface2: rgba(255,255,255,0.85);
      --border: #e4e7f0;
      --border2: rgba(99,102,241,0.15);
      --text-primary: #0f1117;
      --text-secondary: #4a5068;
      --text-tertiary: #9298b0;
      --text-muted: #bcc0d4;

      --indigo: #6366f1;
      --indigo-light: #818cf8;
      --indigo-dark: #4338ca;
      --indigo-pale: #eef2ff;
      --indigo-glow: rgba(99,102,241,0.12);

      --violet: #8b5cf6;
      --emerald: #10b981;
      --emerald-pale: #ecfdf5;
      --rose: #f43f5e;
      --rose-pale: #fff1f2;
      --amber: #f59e0b;
      --amber-pale: #fffbeb;
      --sky: #0ea5e9;
      --sky-pale: #f0f9ff;
      --purple: #a855f7;

      --shadow-sm: 0 1px 3px rgba(15,17,23,0.06), 0 1px 2px rgba(15,17,23,0.04);
      --shadow-md: 0 4px 16px rgba(15,17,23,0.08), 0 2px 6px rgba(15,17,23,0.04);
      --shadow-lg: 0 12px 40px rgba(15,17,23,0.1), 0 4px 16px rgba(15,17,23,0.06);
      --shadow-xl: 0 24px 60px rgba(15,17,23,0.12), 0 8px 24px rgba(15,17,23,0.06);
      --shadow-indigo: 0 8px 32px rgba(99,102,241,0.2);
      --shadow-card: 0 1px 4px rgba(15,17,23,0.06), 0 4px 20px rgba(15,17,23,0.04);

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;

      --transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
      --transition-fast: all 0.14s cubic-bezier(0.4,0,0.2,1);
      --transition-slow: all 0.4s cubic-bezier(0.4,0,0.2,1);

      --sidebar-w: 240px;
      --header-h: 64px;
      --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── SCROLLBAR ─────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ─── LAYOUT ────────────────────────────────────────────────── */
    .app-shell { display: flex; min-height: 100vh; }

    /* ─── SIDEBAR ───────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
    }
    .sidebar-logo {
      height: var(--header-h);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo-mark {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--indigo) 0%, var(--violet) 100%);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 900; color: #fff;
      box-shadow: 0 4px 12px rgba(99,102,241,0.35);
      flex-shrink: 0;
      letter-spacing: -1px;
    }
    .logo-text { font-size: 15px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.4px; }
    .logo-sub { font-size: 9.5px; font-weight: 500; color: var(--text-tertiary); letter-spacing: 0.05em; text-transform: uppercase; margin-top: 1px; }

    .sidebar-section { padding: 20px 12px 8px; }
    .sidebar-section-label { font-size: 9.5px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; padding: 0 8px; margin-bottom: 6px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 500; color: var(--text-secondary);
      cursor: pointer; transition: var(--transition-fast);
      position: relative; text-decoration: none;
      user-select: none;
    }
    .nav-item:hover { background: var(--bg); color: var(--text-primary); }
    .nav-item.active { background: var(--indigo-glow); color: var(--indigo); font-weight: 600; }
    .nav-item.active::before {
      content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 3px; height: 20px; background: var(--indigo);
      border-radius: 0 3px 3px 0;
    }
    .nav-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .nav-badge {
      margin-left: auto; font-size: 10px; font-weight: 700;
      background: var(--indigo); color: #fff;
      padding: 1px 7px; border-radius: 99px; min-width: 20px; text-align: center;
    }
    .nav-badge.green { background: var(--emerald); }
    .nav-badge.amber { background: var(--amber); }

    .sidebar-footer { margin-top: auto; padding: 16px 12px; border-top: 1px solid var(--border); }
    .user-card {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: var(--radius-sm);
      cursor: pointer; transition: var(--transition-fast);
    }
    .user-card:hover { background: var(--bg); }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 99px;
      background: linear-gradient(135deg, var(--indigo), var(--violet));
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .user-name { font-size: 12.5px; font-weight: 600; color: var(--text-primary); }
    .user-role { font-size: 10.5px; color: var(--text-tertiary); }

    /* ─── MAIN CONTENT ──────────────────────────────────────────── */
    .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar {
      height: var(--header-h); background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
      padding: 0 28px; position: sticky; top: 0; z-index: 50;
      box-shadow: var(--shadow-sm);
    }
    .topbar-title { font-size: 15px; font-weight: 700; color: var(--text-primary); }
    .topbar-breadcrumb { font-size: 12px; color: var(--text-tertiary); display: flex; align-items: center; gap: 6px; }
    .topbar-breadcrumb span { color: var(--text-muted); }
    .topbar-actions { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .search-bar {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: var(--radius-full); padding: 6px 14px;
      font-size: 13px; color: var(--text-secondary);
      cursor: text; transition: var(--transition-fast); width: 220px;
    }
    .search-bar:hover { border-color: var(--indigo-light); }
    .search-bar input { background: none; border: none; outline: none; font-size: 13px; color: var(--text-primary); width: 100%; font-family: inherit; }
    .search-bar input::placeholder { color: var(--text-muted); }
    .icon-btn {
      width: 36px; height: 36px; border-radius: var(--radius-sm);
      background: var(--bg); border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: var(--transition-fast);
      font-size: 15px; color: var(--text-secondary);
    }
    .icon-btn:hover { background: var(--surface); border-color: var(--indigo-light); color: var(--indigo); }
    .notif-dot { position: relative; }
    .notif-dot::after {
      content: ''; position: absolute; top: 6px; right: 6px;
      width: 7px; height: 7px; border-radius: 99px;
      background: var(--rose); border: 1.5px solid var(--surface);
    }

    /* ─── PAGE CONTENT ──────────────────────────────────────────── */
    .page-content { padding: 28px; flex: 1; max-width: 1280px; }

    /* ─── STAT CARDS ────────────────────────────────────────────── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 22px 24px;
      box-shadow: var(--shadow-card);
      transition: var(--transition);
      cursor: default; position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      opacity: 0; transition: var(--transition);
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .stat-card:hover::before { opacity: 1; }
    .stat-card.indigo::before { background: linear-gradient(90deg, var(--indigo), var(--violet)); }
    .stat-card.emerald::before { background: linear-gradient(90deg, var(--emerald), #34d399); }
    .stat-card.rose::before { background: linear-gradient(90deg, var(--rose), #fb7185); }
    .stat-card.amber::before { background: linear-gradient(90deg, var(--amber), #fcd34d); }
    .stat-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
    .stat-icon {
      width: 42px; height: 42px; border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 19px;
    }
    .stat-icon.indigo { background: var(--indigo-pale); }
    .stat-icon.emerald { background: var(--emerald-pale); }
    .stat-icon.rose { background: var(--rose-pale); }
    .stat-icon.amber { background: var(--amber-pale); }
    .stat-trend {
      font-size: 11px; font-weight: 600; padding: 3px 8px;
      border-radius: var(--radius-full); display: flex; align-items: center; gap: 3px;
    }
    .stat-trend.up { background: var(--emerald-pale); color: var(--emerald); }
    .stat-trend.down { background: var(--rose-pale); color: var(--rose); }
    .stat-value { font-size: 30px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.5px; line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
    .stat-sub { font-size: 11.5px; color: var(--text-muted); margin-top: 3px; }

    /* ─── SECTION HEADERS ───────────────────────────────────────── */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .section-title { font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .section-sub { font-size: 12.5px; color: var(--text-tertiary); margin-top: 2px; }

    /* ─── BUTTONS ───────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 16px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: var(--transition-fast); border: none; outline: none;
      text-decoration: none; font-family: inherit;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--indigo), var(--violet));
      color: #fff; box-shadow: 0 3px 12px rgba(99,102,241,0.3);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.4); }
    .btn-primary:active { transform: translateY(0); }
    .btn-outline {
      background: var(--surface); color: var(--text-secondary);
      border: 1.5px solid var(--border);
    }
    .btn-outline:hover { border-color: var(--indigo-light); color: var(--indigo); background: var(--indigo-pale); }
    .btn-ghost { background: transparent; color: var(--text-secondary); }
    .btn-ghost:hover { background: var(--bg); color: var(--text-primary); }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-xs { padding: 3px 8px; font-size: 11px; border-radius: 6px; }

    /* ─── MAIN GRID ─────────────────────────────────────────────── */
    .main-grid { display: grid; grid-template-columns: 1fr 360px; gap: 24px; margin-bottom: 28px; }

    /* ─── JOB CARD ──────────────────────────────────────────────── */
    .job-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-card);
      overflow: hidden;
    }
    .job-card-header {
      padding: 20px 24px;
      background: linear-gradient(135deg, #f8f9ff 0%, #eef0ff 100%);
      border-bottom: 1px solid var(--border2);
      display: flex; align-items: flex-start; gap: 16px;
    }
    .company-logo {
      width: 52px; height: 52px; border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--indigo), var(--violet));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900; color: #fff;
      flex-shrink: 0; box-shadow: var(--shadow-indigo);
      letter-spacing: -1px;
    }
    .job-title { font-size: 17px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.3px; margin-bottom: 3px; }
    .job-company { font-size: 13px; font-weight: 600; color: var(--indigo); margin-bottom: 6px; }
    .job-meta { display: flex; gap: 16px; flex-wrap: wrap; }
    .job-meta-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-secondary); }
    .job-card-body { padding: 20px 24px; }
    .skill-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; }
    .skill-tag {
      padding: 4px 10px; border-radius: var(--radius-full);
      font-size: 11.5px; font-weight: 600; border: 1.5px solid;
      transition: var(--transition-fast); cursor: default;
    }
    .skill-tag.required { background: var(--indigo-pale); color: var(--indigo); border-color: rgba(99,102,241,0.25); }
    .skill-tag.optional { background: var(--bg); color: var(--text-secondary); border-color: var(--border); }
    .skill-tag:hover { transform: scale(1.03); }
    .tag-label { font-size: 9.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }

    /* ─── PIPELINE STATS ────────────────────────────────────────── */
    .pipeline-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-card);
      padding: 20px;
    }
    .pipeline-title { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .pipeline-step {
      display: flex; align-items: center; gap: 12px; padding: 10px 0;
      border-bottom: 1px solid var(--border); position: relative;
    }
    .pipeline-step:last-child { border-bottom: none; }
    .pipeline-step-icon {
      width: 32px; height: 32px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .pipeline-step-label { font-size: 12.5px; font-weight: 600; color: var(--text-primary); flex: 1; }
    .pipeline-step-count { font-size: 11.5px; font-weight: 700; padding: 2px 9px; border-radius: var(--radius-full); }
    .pipeline-progress {
      height: 4px; background: var(--bg2); border-radius: 99px;
      margin-top: 14px; overflow: hidden;
    }
    .pipeline-progress-bar {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--indigo), var(--violet));
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ─── CANDIDATES TABLE ──────────────────────────────────────── */
    .candidates-section { margin-bottom: 28px; }
    .table-container {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-card);
      overflow: hidden;
    }
    .table-toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .filter-tabs { display: flex; gap: 4px; background: var(--bg); border-radius: var(--radius-sm); padding: 3px; }
    .filter-tab {
      padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: var(--transition-fast); color: var(--text-secondary);
      border: none; background: none; font-family: inherit;
    }
    .filter-tab.active { background: var(--surface); color: var(--indigo); box-shadow: var(--shadow-sm); }
    .filter-tab:hover:not(.active) { color: var(--text-primary); }
    .sort-btn {
      display: flex; align-items: center; gap: 5px; padding: 5px 12px;
      border-radius: var(--radius-sm); font-size: 12px; font-weight: 500;
      color: var(--text-secondary); background: var(--bg);
      border: 1.5px solid var(--border); cursor: pointer; transition: var(--transition-fast); font-family: inherit;
    }
    .sort-btn:hover { border-color: var(--indigo-light); color: var(--indigo); }

    /* ─── CANDIDATE CARDS ───────────────────────────────────────── */
    .candidates-list { display: flex; flex-direction: column; }
    .candidate-row {
      display: grid;
      grid-template-columns: 44px 1fr 130px 120px 120px 100px 110px;
      align-items: center; gap: 16px;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: var(--transition-fast);
      position: relative;
    }
    .candidate-row:last-child { border-bottom: none; }
    .candidate-row:hover { background: var(--bg); }
    .candidate-row:hover .row-reveal { opacity: 1; }
    .candidate-row.expanded { background: var(--indigo-glow); }
    .row-rank {
      width: 32px; height: 32px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; flex-shrink: 0;
    }
    .row-rank.top3 { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; }
    .row-rank.top10 { background: var(--indigo-pale); color: var(--indigo); }
    .row-rank.rest { background: var(--bg2); color: var(--text-secondary); }
    .candidate-info { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .candidate-avatar {
      width: 38px; height: 38px; border-radius: 99px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
    }
    .candidate-name { font-size: 13.5px; font-weight: 700; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .candidate-role { font-size: 11.5px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .candidate-company { font-size: 11px; color: var(--text-tertiary); }

    /* Score bar */
    .score-cell { display: flex; flex-direction: column; gap: 4px; }
    .score-value { font-size: 14px; font-weight: 800; color: var(--text-primary); font-family: var(--font-mono); }
    .score-bar-track { height: 4px; background: var(--bg2); border-radius: 99px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 99px; transition: width 1s cubic-bezier(0.4,0,0.2,1); }

    /* Verdict badge */
    .verdict-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: var(--radius-full);
      font-size: 11px; font-weight: 700; letter-spacing: 0.02em;
    }
    .verdict-robust { background: var(--emerald-pale); color: var(--emerald); }
    .verdict-contested { background: var(--amber-pale); color: var(--amber); }
    .verdict-fragile { background: var(--rose-pale); color: var(--rose); }
    .verdict-dot { width: 6px; height: 6px; border-radius: 99px; flex-shrink: 0; animation: pulse 2s ease infinite; }
    .verdict-robust .verdict-dot { background: var(--emerald); }
    .verdict-contested .verdict-dot { background: var(--amber); }
    .verdict-fragile .verdict-dot { background: var(--rose); }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    /* Path coverage */
    .path-dots { display: flex; gap: 4px; }
    .path-dot {
      width: 8px; height: 8px; border-radius: 2px;
      transition: var(--transition-fast);
    }
    .path-dot:hover { transform: scale(1.3); }
    .path-dot.active { opacity: 1; }
    .path-dot.inactive { opacity: 0.18; }

    .yoe-badge { font-size: 11.5px; font-weight: 600; color: var(--text-secondary); font-family: var(--font-mono); }

    /* Table header */
    .table-header {
      display: grid;
      grid-template-columns: 44px 1fr 130px 120px 120px 100px 110px;
      align-items: center; gap: 16px;
      padding: 10px 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .th { font-size: 10.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }

    /* ─── EXPANDED DETAIL ───────────────────────────────────────── */
    .detail-panel {
      margin: 0 20px 16px;
      background: linear-gradient(135deg, #f8f9ff 0%, #fafbff 100%);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      animation: slideDown 0.22s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .detail-section-title { font-size: 10.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
    .score-breakdown-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .sbl { font-size: 12px; color: var(--text-secondary); flex: 1; font-weight: 500; }
    .sbv { font-size: 12px; font-weight: 700; color: var(--text-primary); font-family: var(--font-mono); min-width: 36px; text-align: right; }
    .sbb { flex: 1; height: 6px; background: var(--bg2); border-radius: 99px; overflow: hidden; }
    .sbb-fill { height: 100%; border-radius: 99px; }

    .signal-list { display: flex; flex-direction: column; gap: 5px; }
    .signal-row { display: flex; align-items: center; gap: 8px; font-size: 11.5px; }
    .signal-icon { font-size: 12px; }
    .signal-text { color: var(--text-secondary); flex: 1; }
    .signal-val { font-size: 11px; font-weight: 600; font-family: var(--font-mono); }
    .signal-val.good { color: var(--emerald); }
    .signal-val.warn { color: var(--amber); }
    .signal-val.bad { color: var(--rose); }

    .reason-box {
      background: var(--surface); border: 1.5px solid var(--border2);
      border-radius: var(--radius-md); padding: 14px;
    }
    .reason-advocate { font-size: 12px; color: #059669; line-height: 1.6; margin-bottom: 10px; }
    .reason-skeptic { font-size: 12px; color: #dc2626; line-height: 1.6; margin-bottom: 10px; }
    .reason-text { font-size: 12px; color: var(--text-secondary); line-height: 1.65; }
    .reason-label { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .reason-label.pos { color: var(--emerald); }
    .reason-label.neg { color: var(--rose); }
    .reason-label.neu { color: var(--text-muted); }

    /* ─── CHARTS SECTION ────────────────────────────────────────── */
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    .chart-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px;
      box-shadow: var(--shadow-card); transition: var(--transition);
    }
    .chart-card:hover { box-shadow: var(--shadow-md); }
    .chart-title { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
    .chart-sub { font-size: 11.5px; color: var(--text-tertiary); margin-bottom: 18px; }

    /* Donut */
    .donut-wrap { display: flex; align-items: center; gap: 20px; }
    .donut-svg { flex-shrink: 0; }
    .donut-legend { display: flex; flex-direction: column; gap: 8px; }
    .donut-legend-item { display: flex; align-items: center; gap: 8px; }
    .dl-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
    .dl-label { font-size: 12px; color: var(--text-secondary); }
    .dl-value { font-size: 12px; font-weight: 700; color: var(--text-primary); margin-left: auto; font-family: var(--font-mono); }

    /* Bar chart */
    .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 100px; padding-top: 8px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .bar { width: 100%; border-radius: 4px 4px 0 0; transition: height 1s cubic-bezier(0.4,0,0.2,1); position: relative; cursor: default; }
    .bar:hover { filter: brightness(1.08); }
    .bar-label { font-size: 9px; color: var(--text-muted); font-family: var(--font-mono); text-align: center; }
    .bar-val { font-size: 10px; font-weight: 700; color: var(--text-secondary); font-family: var(--font-mono); }

    /* Sparkline */
    .sparkline-wrap { position: relative; }
    .sparkline-labels { display: flex; justify-content: space-between; margin-top: 6px; }
    .spark-label { font-size: 9px; color: var(--text-muted); font-family: var(--font-mono); }

    /* ─── PIPELINE VISUAL ───────────────────────────────────────── */
    .pipeline-visual {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 22px 24px;
      box-shadow: var(--shadow-card); margin-bottom: 28px;
    }
    .pipeline-flow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .pipeline-node {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 12px 14px; border-radius: var(--radius-md);
      border: 1.5px solid; cursor: default;
      transition: var(--transition); min-width: 90px; text-align: center;
    }
    .pipeline-node:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .pn-icon { font-size: 20px; }
    .pn-label { font-size: 10.5px; font-weight: 700; }
    .pn-count { font-size: 11px; font-family: var(--font-mono); font-weight: 600; }
    .pn-arrow { font-size: 16px; color: var(--text-muted); flex-shrink: 0; }

    .pn-indigo { border-color: rgba(99,102,241,0.3); background: var(--indigo-pale); color: var(--indigo); }
    .pn-violet { border-color: rgba(139,92,246,0.3); background: #f5f3ff; color: var(--violet); }
    .pn-emerald { border-color: rgba(16,185,129,0.3); background: var(--emerald-pale); color: var(--emerald); }
    .pn-rose { border-color: rgba(244,63,94,0.3); background: var(--rose-pale); color: var(--rose); }
    .pn-amber { border-color: rgba(245,158,11,0.3); background: var(--amber-pale); color: var(--amber); }
    .pn-sky { border-color: rgba(14,165,233,0.3); background: var(--sky-pale); color: var(--sky); }

    /* ─── ACTIVITY FEED ─────────────────────────────────────────── */
    .activity-feed {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px;
      box-shadow: var(--shadow-card);
    }
    .activity-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .activity-item:last-child { border-bottom: none; }
    .activity-dot {
      width: 8px; height: 8px; border-radius: 99px;
      margin-top: 4px; flex-shrink: 0;
    }
    .activity-body { flex: 1; }
    .activity-text { font-size: 12.5px; color: var(--text-primary); line-height: 1.5; }
    .activity-text strong { font-weight: 600; }
    .activity-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-family: var(--font-mono); }

    /* ─── SPRINT MINI ───────────────────────────────────────────── */
    .sprint-progress {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px;
      box-shadow: var(--shadow-card);
    }
    .sprint-phases { display: flex; gap: 4px; margin: 14px 0; }
    .sprint-phase {
      flex: 1; height: 28px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; cursor: default;
      transition: var(--transition-fast);
    }
    .sprint-phase:hover { transform: scaleY(1.15); }

    /* ─── GLASSMORPHISM BANNER ──────────────────────────────────── */
    .hero-banner {
      background: linear-gradient(135deg, var(--indigo) 0%, var(--violet) 50%, #c084fc 100%);
      border-radius: var(--radius-xl); padding: 28px 32px;
      margin-bottom: 28px; position: relative; overflow: hidden;
      box-shadow: var(--shadow-indigo);
    }
    .hero-banner::before {
      content: ''; position: absolute; top: -50%; right: -10%;
      width: 400px; height: 400px; border-radius: 50%;
      background: rgba(255,255,255,0.07);
      pointer-events: none;
    }
    .hero-banner::after {
      content: ''; position: absolute; bottom: -40%; left: 20%;
      width: 300px; height: 300px; border-radius: 50%;
      background: rgba(255,255,255,0.05);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.18); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: var(--radius-full); padding: 4px 12px;
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.9);
      letter-spacing: 0.04em; margin-bottom: 10px;
    }
    .hero-title { font-size: 22px; font-weight: 900; color: #fff; letter-spacing: -0.5px; margin-bottom: 4px; }
    .hero-sub { font-size: 13.5px; color: rgba(255,255,255,0.75); line-height: 1.5; max-width: 500px; }
    .hero-stats { display: flex; gap: 28px; margin-top: 20px; flex-wrap: wrap; }
    .hero-stat-val { font-size: 26px; font-weight: 900; color: #fff; letter-spacing: -0.5px; }
    .hero-stat-label { font-size: 11px; color: rgba(255,255,255,0.65); font-weight: 500; margin-top: 1px; }
    .hero-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-hero-primary {
      background: #fff; color: var(--indigo);
      padding: 9px 20px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 700; cursor: pointer;
      border: none; transition: var(--transition-fast);
      display: inline-flex; align-items: center; gap: 7px;
      font-family: inherit; box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    }
    .btn-hero-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
    .btn-hero-ghost {
      background: rgba(255,255,255,0.15); color: #fff;
      padding: 9px 20px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: 1.5px solid rgba(255,255,255,0.3);
      transition: var(--transition-fast);
      display: inline-flex; align-items: center; gap: 7px;
      font-family: inherit; backdrop-filter: blur(8px);
    }
    .btn-hero-ghost:hover { background: rgba(255,255,255,0.25); }

    /* ─── HONEYPOT ALERT ────────────────────────────────────────── */
    .honeypot-alert {
      background: linear-gradient(135deg, #fff5f5, #fff1f2);
      border: 1.5px solid rgba(244,63,94,0.2);
      border-radius: var(--radius-md); padding: 14px 16px;
      display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px;
    }
    .hp-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .hp-title { font-size: 13px; font-weight: 700; color: #be123c; margin-bottom: 3px; }
    .hp-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }

    /* ─── EMPTY STATE ───────────────────────────────────────────── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      padding: 48px; text-align: center;
    }
    .empty-icon { font-size: 44px; margin-bottom: 14px; opacity: 0.4; }
    .empty-title { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
    .empty-desc { font-size: 13px; color: var(--text-tertiary); max-width: 300px; line-height: 1.6; }

    /* ─── LOADING STATE ─────────────────────────────────────────── */
    .loading-skeleton {
      background: linear-gradient(90deg, var(--bg) 25%, var(--bg2) 50%, var(--bg) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ─── TOOLTIP ───────────────────────────────────────────────── */
    [data-tip] { position: relative; cursor: default; }
    [data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
      background: var(--text-primary); color: #fff;
      font-size: 11px; font-weight: 500; padding: 5px 10px;
      border-radius: 6px; white-space: nowrap; z-index: 999;
      pointer-events: none; font-family: 'Inter', sans-serif;
      box-shadow: var(--shadow-md);
    }

    /* ─── TAG SMALL ─────────────────────────────────────────────── */
    .tag-xs {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: var(--radius-full);
      font-size: 10.5px; font-weight: 600;
    }
    .tag-indigo { background: var(--indigo-pale); color: var(--indigo); }
    .tag-emerald { background: var(--emerald-pale); color: var(--emerald); }
    .tag-rose { background: var(--rose-pale); color: var(--rose); }
    .tag-amber { background: var(--amber-pale); color: var(--amber); }
    .tag-sky { background: var(--sky-pale); color: var(--sky); }
    .tag-violet { background: #f5f3ff; color: var(--violet); }

    /* ─── DIVIDER ───────────────────────────────────────────────── */
    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    /* ─── TOAST ─────────────────────────────────────────────────── */
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      background: var(--text-primary); color: #fff;
      padding: 12px 18px; border-radius: var(--radius-md);
      font-size: 13px; font-weight: 500;
      box-shadow: var(--shadow-xl);
      display: flex; align-items: center; gap: 10px;
      animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
      min-width: 260px; max-width: 360px;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px) scale(0.96); }
      to { opacity: 1; transform: translateX(0) scale(1); }
    }
    .toast.success { background: #059669; }
    .toast.warning { background: var(--amber); }
    .toast.error { background: var(--rose); }

    /* ─── MODAL ─────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(15,17,23,0.45);
      backdrop-filter: blur(4px); z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none; transition: var(--transition);
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 28px; max-width: 540px; width: 100%;
      box-shadow: var(--shadow-xl);
      transform: scale(0.96) translateY(10px);
      transition: var(--transition);
    }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }
    .modal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
    .modal-title { font-size: 17px; font-weight: 800; color: var(--text-primary); }
    .modal-close { width: 28px; height: 28px; border-radius: var(--radius-sm); background: var(--bg); border: none; cursor: pointer; font-size: 14px; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; transition: var(--transition-fast); }
    .modal-close:hover { background: var(--bg2); color: var(--text-primary); }

    /* ─── RESPONSIVE ────────────────────────────────────────────── */
    @media (max-width: 1200px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .charts-grid { grid-template-columns: 1fr 1fr; }
      .main-grid { grid-template-columns: 1fr; }
      .candidate-row { grid-template-columns: 36px 1fr 110px 100px; }
      .candidate-row > *:nth-child(n+5) { display: none; }
      .table-header > *:nth-child(n+5) { display: none; }
    }
    @media (max-width: 900px) {
      :root { --sidebar-w: 0px; }
      .sidebar { transform: translateX(-240px); }
      .sidebar.open { transform: translateX(0); width: 240px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .charts-grid { grid-template-columns: 1fr; }
      .detail-panel { grid-template-columns: 1fr; }
    }

    /* ─── MISC UTILITIES ────────────────────────────────────────── */
    .flex { display: flex; }
    .items-center { align-items: center; }
    .gap-8 { gap: 8px; }
    .gap-12 { gap: 12px; }
    .gap-16 { gap: 16px; }
    .ml-auto { margin-left: auto; }
    .font-mono { font-family: var(--font-mono); }
    .text-muted { color: var(--text-muted); }
    .text-secondary { color: var(--text-secondary); }
    .text-primary-c { color: var(--text-primary); }
    .fw-700 { font-weight: 700; }
    .fw-600 { font-weight: 600; }
    .fs-12 { font-size: 12px; }
    .fs-11 { font-size: 11px; }

    /* ─── ENTRY ANIMATIONS ──────────────────────────────────────── */
    .fade-in { opacity: 0; animation: fadeIn 0.5s ease forwards; }
    .fade-in-up { opacity: 0; animation: fadeInUp 0.5s cubic-bezier(0.4,0,0.2,1) forwards; }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .delay-1 { animation-delay: 0.08s; }
    .delay-2 { animation-delay: 0.16s; }
    .delay-3 { animation-delay: 0.24s; }
    .delay-4 { animation-delay: 0.32s; }
    .delay-5 { animation-delay: 0.4s; }

    /* ─── STATUS INDICATOR ──────────────────────────────────────── */
    .status-dot { width: 8px; height: 8px; border-radius: 99px; display: inline-block; }
    .status-live { background: var(--emerald); animation: statusPulse 2s ease infinite; }
    @keyframes statusPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
      50% { box-shadow: 0 0 0 5px rgba(16,185,129,0); }
    }

    /* ─── CONFIDENCE METER ──────────────────────────────────────── */
    .conf-meter { display: flex; align-items: center; gap: 3px; }
    .conf-bar { width: 16px; height: 16px; border-radius: 3px; }

    /* upload area */
    .upload-area {
      border: 2px dashed var(--border); border-radius: var(--radius-lg);
      padding: 32px; text-align: center; cursor: pointer;
      transition: var(--transition-fast);
      background: var(--bg);
    }
    .upload-area:hover { border-color: var(--indigo-light); background: var(--indigo-glow); }
    .upload-icon { font-size: 36px; margin-bottom: 12px; }
    .upload-title { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
    .upload-sub { font-size: 12px; color: var(--text-tertiary); }

    /* progress ring */
    .progress-ring { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .ring-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
  </style>
</head>
<body>
<div class="app-shell" id="app">

  <!-- ─── SIDEBAR ──────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">R⚡</div>
      <div>
        <div class="logo-text">RAGnarok</div>
        <div class="logo-sub">ATS Platform</div>
      </div>
    </div>

    <div style="flex:1; overflow-y:auto; padding-bottom:8px;">
      <div class="sidebar-section">
        <div class="sidebar-section-label">Core</div>
        <div class="nav-item active" id="nav-dashboard" onclick="navigate('dashboard')">
          <div class="nav-icon">📊</div> Dashboard
        </div>
        <div class="nav-item" id="nav-candidates" onclick="navigate('candidates')">
          <div class="nav-icon">👥</div> Candidates
          <span class="nav-badge">100K</span>
        </div>
        <div class="nav-item" id="nav-jobs" onclick="navigate('jobs')">
          <div class="nav-icon">💼</div> Job Roles
          <span class="nav-badge green">1</span>
        </div>
        <div class="nav-item" id="nav-pipeline" onclick="navigate('pipeline')">
          <div class="nav-icon">⚡</div> Pipeline
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-label">Analysis</div>
        <div class="nav-item" id="nav-scoring" onclick="navigate('scoring')">
          <div class="nav-icon">🎯</div> Scoring Engine
        </div>
        <div class="nav-item" id="nav-trust" onclick="navigate('trust')">
          <div class="nav-icon">🛡️</div> Trust Layer
          <span class="nav-badge amber">3</span>
        </div>
        <div class="nav-item" id="nav-analytics" onclick="navigate('analytics')">
          <div class="nav-icon">📈</div> Analytics
        </div>
      </div>


    </div>

    <div class="sidebar-footer">
      <div style="display:flex; align-items:center; gap:6px; padding: 8px 10px; margin-bottom:6px;">
        <div class="status-dot status-live"></div>
        <span style="font-size:11.5px; color:var(--emerald); font-weight:600;">Pipeline Active</span>
        <span style="font-size:10px; color:var(--text-muted); margin-left:4px; font-family:var(--font-mono);">~15s</span>
      </div>
      <!-- API health badge -->
      <div style="padding: 4px 10px; margin-bottom:8px;">
        <span id="api-health-badge"
          style="font-size:11px;font-weight:700;color:#9298b0;cursor:pointer;"
          onclick="updateHealthBadge()"
          title="Click to refresh API status">
          ⚪ Checking API…
        </span>
      </div>

    </div>
  </aside>

  <!-- ─── MAIN ──────────────────────────────────────────────────── -->
  <main class="main">
    <header class="topbar">
      <div>
        <div class="topbar-title" id="topbar-title">Dashboard</div>
        <div class="topbar-breadcrumb">
          <span>RAGnarok</span>
          <span>›</span>
          <span id="topbar-bc" style="color:var(--text-secondary)">Overview</span>
        </div>
      </div>
      <div class="topbar-actions">
        <div class="search-bar">
          <span style="font-size:14px; color:var(--text-muted)">🔍</span>
          <input type="text" placeholder="Search candidates, jobs…" id="search-input" oninput="handleSearch(this.value)" />
        </div>
        <button class="icon-btn" title="Upload candidates file" onclick="showUploadModal()" style="font-size:14px;">📂</button>
        <button class="icon-btn notif-dot" title="Notifications" onclick="showNotifs()">🔔</button>
        <button class="icon-btn" title="Export" onclick="showExport()">⬇️</button>
        <button class="btn btn-primary btn-sm" onclick="runPipeline()">⚡ Run Pipeline</button>
      </div>
    </header>

    <div class="page-content" id="page-content">

function renderVerdictDonut() {
  const data = [
    { label: 'ROBUST', value: 58, color: '#10b981' },
    { label: 'CONTESTED', value: 28, color: '#f59e0b' },
    { label: 'FRAGILE', value: 14, color: '#f43f5e' },
  ];
  const total = 100;
  let offset = 25;
  const r = 42, cx = 56, cy = 56;
  const circ = 2 * Math.PI * r;

  let paths = '';
  data.forEach(d => {
    const pct = d.value / total;
    const dash = pct * circ;
    const gap = circ - dash;
    paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="14" stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}" stroke-dashoffset="${-(offset / total * circ).toFixed(1)}" stroke-linecap="round" />`;
    offset += d.value;
  });

  return `
    <div class="chart-card">
      <div class="chart-title">Verdict Distribution</div>
      <div class="chart-sub">Trust layer confidence across top-100</div>
      <div class="donut-wrap">
        <svg class="donut-svg" width="112" height="112" viewBox="0 0 112 112">
          <circle cx="56" cy="56" r="42" fill="none" stroke="#f1f3fa" stroke-width="14"/>
          ${paths}
          <text x="56" y="52" text-anchor="middle" fill="#0f1117" font-size="14" font-weight="800" font-family="Inter">100</text>
          <text x="56" y="65" text-anchor="middle" fill="#9298b0" font-size="9" font-family="Inter">ranked</text>
        </svg>
        <div class="donut-legend">
          ${data.map(d => `
            <div class="donut-legend-item">
              <div class="dl-dot" style="background:${d.color}"></div>
              <div class="dl-label">${d.label}</div>
              <div class="dl-value">${d.value}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

function filterCandidates(val) {
  if (!val) {
    const list = document.getElementById('candidates-list');
    if (list) list.innerHTML = renderCandidateRows(CANDIDATES);
    return;
  }
  const filtered = CANDIDATES.filter(c =>
    c.name.toLowerCase().includes(val.toLowerCase()) ||
    c.company.toLowerCase().includes(val.toLowerCase()) ||
    c.role.toLowerCase().includes(val.toLowerCase()) ||
    c.skills.some(s => s.toLowerCase().includes(val.toLowerCase()))
  );

}

const API_BASE = 'http://localhost:8000';
const API_TIMEOUT = 310000; // 5 min + buffer

// ─── API HEALTH CHECK ──────────────────────────────────────────────────────────
async function checkApiHealth() {
  try {
    const r = await fetch(`${API_BASE}/health`, { signal: AbortSignal.timeout(3000) });
    if (!r.ok) return false;
    const data = await r.json();
    return data.pipeline_ready === true;
  } catch { return false; }
}

// Update health badge in sidebar
async function updateHealthBadge() {
  const badge = document.getElementById('api-health-badge');
  if (!badge) return;
  const healthy = await checkApiHealth();
  badge.textContent = healthy ? '🟢 API Ready' : '🟡 API Offline';
  badge.style.color = healthy ? '#10b981' : '#f59e0b';

// ─── LOAD LAST RESULTS FROM API ────────────────────────────────────────────────
async function loadResultsFromApi() {
  try {
    const r = await fetch(`${API_BASE}/results`, { signal: AbortSignal.timeout(5000) });
    if (!r.ok) return null;
    const data = await r.json();
    if (data.status === 'success' && data.ranked && data.ranked.length > 0) {
      return data;
    }
  } catch {}
  return null;
}

// Populate CANDIDATES from API results (maps RankedCandidateOut → CANDIDATES format)
function injectApiResults(data) {
  if (!data || !data.ranked) return;
  const ranked = data.ranked;

  // Map API schema to the display schema used by renderCandidateRows
  CANDIDATES.splice(0, CANDIDATES.length); // clear existing
  ranked.forEach(rc => {
    const comp = rc.components || {};
    const trust = rc.trust || {};
    const sigs = rc.signals || {};
    const paths = comp.paths_present || [];

    CANDIDATES.push({
      id: rc.candidate_id,
      name: rc.name || rc.candidate_id,
      role: rc.current_title || '—',
      company: rc.current_company || '—',
      location: rc.location || '—',
      yoe: rc.years_of_experience || 0,
      score: rc.score || 0,
      verdict: trust.verdict || 'CONTESTED',
      confidence: trust.confidence_pct || 0,
      flipRisk: trust.flip_risk || 'MEDIUM',
      paths: {
        semantic:   paths.some(p => p.toLowerCase() === 'semantic'),
        keyword:    paths.some(p => p.toLowerCase() === 'keyword'),
        ontology:   paths.some(p => p.toLowerCase() === 'ontology'),
        trajectory: paths.some(p => p.toLowerCase() === 'trajectory'),
        signal:     paths.some(p => p.toLowerCase() === 'signal'),
      },
      scores: {
        skill:    comp.skill_match_score    || 0,
        career:   comp.career_quality_score || 0,
        behavioral: comp.behavioral_score  || 0,
        crossEncoder: comp.cross_encoder_score || 0,
        rrf:      comp.rrf_score           || 0,
        trajectoryVelocity: comp.trajectory_velocity || 0,
        locationBonus: comp.location_bonus_applied || 0,
        uncertaintyPenalty: comp.uncertainty_penalty_applied || 1,
      },
      skills: (rc.skills || []).map(s => s.name),
      signals: {
        openToWork:      sigs.open_to_work || false,
        noticePeriod:    sigs.notice_period_days || 0,
        lastActive:      sigs.last_active_date || '—',
        recruiterRate:   sigs.recruiter_response_rate || 0,
        github:          sigs.github_activity_score || -1,
        completeness:    sigs.profile_completeness_score || 0,
        relocation:      sigs.willing_to_relocate || false,
        workMode:        sigs.preferred_work_mode || '—',
      },
      advocate:  (trust.advocate_signals || []).map(s => `[${s.confidence}] ${s.label}: ${s.value}`),
      skeptic:   (trust.skeptic_signals || []).map(s => `[${s.severity}] ${s.label}: ${s.value}`),
      falsifiability: trust.falsifiability || [],
      reasoning: rc.reasoning || '—',
      isHoneypot: rc.is_honeypot || false,
      rank: rc.rank,
    });
  });

  showToast(`✅ Loaded ${ranked.length} ranked candidates from last pipeline run`, 'success');
  if (currentPage === 'candidates' || currentPage === 'dashboard') renderPage(currentPage);
}

// ─── REAL PIPELINE RUNNER (calls POST /rank) ────────────────────────────────
async function runPipeline() {
  if (pipelineRunning) return;

  // Check if candidates JSONL is available in sessionStorage (set by file upload)
  const candidatesJsonl = sessionStorage.getItem('candidates_jsonl');
  if (!candidatesJsonl) {
    showToast('📌 No candidates loaded. Use the file upload button to load candidates.jsonl', '');
    showUploadModal();
    return;
  }

  pipelineRunning = true;
  showToast('⚡ Starting RAGnarok pipeline…', '');

  // Animate toasts while waiting
  const stageToasts = [
    { msg: '📥 Loading FAISS + BM25 + feature store…', delay: 0 },
    { msg: '🔤 Encoding JD query (MiniLM-384d)…', delay: 2000 },
    { msg: '🔀 Running 5 parallel retrieval paths…', delay: 5000 },
    { msg: '🔗 RRF fusion → top-60 pool…', delay: 8000 },
    { msg: '🛑 Honeypot registry filter…', delay: 10000 },
    { msg: '🧠 Cross-encoder reranking top-50…', delay: 12000 },
    { msg: '🎯 Composite scoring 0.40+0.35+0.25…', delay: 14000 },
    { msg: '🛡️ Adversarial trust layer…', delay: 16000 },
  ];
  const toastTimers = stageToasts.map(s =>
    setTimeout(() => showToast(s.msg), s.delay)
  );

  try {
    const payload = {
      candidates_jsonl: candidatesJsonl,
      jd_text: null,   // use pre-parsed JD
      top_k: 100,
    };

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), API_TIMEOUT);

    const response = await fetch(`${API_BASE}/rank`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: controller.signal,
    });
    clearTimeout(timeoutId);
    toastTimers.forEach(t => clearTimeout(t));

    if (!response.ok) {
      const err = await response.json().catch(() => ({ message: response.statusText }));
      throw new Error(err.detail || err.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    injectApiResults(data);

    const elapsed = (data.pipeline_elapsed_ms / 1000).toFixed(1);
    showToast(`✅ Pipeline complete · ${data.ranked.length} candidates · ${data.honeypots_removed} honeypots · ${elapsed}s`, 'success');

    // Update dashboard stats
    updateDashboardStats(data);

  } catch (err) {
    toastTimers.forEach(t => clearTimeout(t));
    if (err.name === 'AbortError') {
      showToast('⏱️ Pipeline timed out. Try a smaller batch or check the API.', '');
    } else {
      showToast(`❌ Pipeline error: ${err.message}`, '');
      console.error('Pipeline run failed:', err);
    }
  } finally {
    pipelineRunning = false;
  }
}

async function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const status = document.getElementById('upload-status');
  status.textContent = '⏳ Reading file…';

  try {
    let text;
    if (file.name.endsWith('.gz')) {
      const buffer = await file.arrayBuffer();
      const ds = new DecompressionStream('gzip');
      const blob = new Blob([buffer]);
      const stream = blob.stream().pipeThrough(ds);
      const reader = stream.getReader();
      const chunks = [];
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
      }
      text = new TextDecoder().decode(
        new Uint8Array(chunks.reduce((a, b) => [...a, ...b], []))
      );
    } else {
      text = await file.text();
    }

    // Support JSON array format
    const stripped = text.trim();
    let jsonl = text;
    if (stripped.startsWith('[')) {
      const arr = JSON.parse(stripped);
      jsonl = arr.map(o => JSON.stringify(o)).join('\n');
    }

    const lines = jsonl.split('\n').filter(l => l.trim()).length;
    sessionStorage.setItem('candidates_jsonl', jsonl);
    status.innerHTML = `<span style="color:var(--emerald);">✅ Loaded <strong>${lines.toLocaleString()}</strong> candidates (${(file.size/1024).toFixed(0)} KB). Close this dialog and click ⚡ Run Pipeline.</span>`;
    showToast(`✅ ${lines.toLocaleString()} candidates loaded`, 'success');
  } catch (e) {
    status.innerHTML = `<span style="color:var(--rose);">❌ Error: ${e.message}</span>`;
  }
}

async function exportSubmissionCsv() {
  try {
    showToast('⬇️ Generating submission.csv…', '');
    const response = await fetch(`${API_BASE}/export/csv`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ validate_before_export: true }),
      signal: AbortSignal.timeout(30000),
    });
    if (!response.ok) {
      const err = await response.json().catch(() => ({ detail: response.statusText }));
      throw new Error(err.detail || `HTTP ${response.status}`);
    }
    const blob = await response.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'submission.csv';
    a.click();
    URL.revokeObjectURL(url);
    showToast('✅ submission.csv downloaded!', 'success');
  } catch (err) {
    showToast(`❌ Export failed: ${err.message}. Run POST /rank first.`, '');
  }
}

          <div style="font-size:11.5px;color:var(--text-muted);">Upload .jsonl / .json / .jsonl.gz to run the pipeline</div>
        </div>
        <div style="font-size:12px;color:var(--indigo);">↑ upload</div>
      </div>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

// Export from UI CANDIDATES array (fallback, no API needed)
function exportLocalCsv() {
  if (!CANDIDATES.length) {
    showToast('❌ No candidates loaded. Run the pipeline first.', '');
    return;
  }
  const rows = ['candidate_id,rank,score,reasoning'];
  CANDIDATES.forEach((c, i) => {
    const reasoning = (c.reasoning || '').replace(/"/g, '""');
    rows.push(`${c.id},${c.rank || i + 1},${c.score.toFixed(6)},"${reasoning}"`);
  });
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'submission_ui.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ submission_ui.csv downloaded!', 'success');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderPage('dashboard');

// Animate bar charts after render
setTimeout(() => {
  document.querySelectorAll('.score-bar-fill').forEach(el => {
    const w = el.style.width;
    el.style.width = '0';
    requestAnimationFrame(() => {
      setTimeout(() => { el.style.width = w; }, 50);
    });
  });
}, 300);
</script>
