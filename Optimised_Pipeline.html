<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimized Architecture</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0">
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const COLORS = {
  bg: "#0a0c12",
  panel: "#10141f",
  border: "#1e2535",
  precomp: "#0d1f1a",
  precompBorder: "#1a4a3a",
  ranking: "#0d1525",
  rankingBorder: "#1a3a5a",
  teal: "#00e5b0",
  blue: "#3b9eff",
  amber: "#f5a623",
  red: "#ff5c5c",
  purple: "#a78bfa",
  green: "#34d399",
  gray: "#8892a4",
  lightText: "#e2e8f0",
  dimText: "#64748b",
  yellow: "#fbbf24",
};

const NODE_STYLES = {
  input: { bg: "#1a1f2e", border: "#3b4a6b", accent: COLORS.gray },
  parser: { bg: "#0f2a1f", border: "#1a5a3a", accent: COLORS.teal },
  index: { bg: "#1a1f2e", border: "#2a3a5a", accent: COLORS.blue },
  path: { bg: "#1f1a2e", border: "#3a2a5a", accent: COLORS.purple },
  fusion: { bg: "#1a2a1f", border: "#2a5a3a", accent: COLORS.green },
  filter: { bg: "#2a1a1a", border: "#5a2a2a", accent: COLORS.red },
  score: { bg: "#1a2230", border: "#2a3a50", accent: COLORS.blue },
  composite: { bg: "#0f2a1f", border: "#1a5a3a", accent: COLORS.teal },
  trust: { bg: "#2a1f0f", border: "#5a3a1a", accent: COLORS.amber },
  output: { bg: "#1a1f2e", border: "#3b9eff", accent: COLORS.blue },
  expansion: { bg: "#1f1a0f", border: "#4a3a1a", accent: COLORS.yellow },
};

function Arrow({ label, color = COLORS.dimText }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", margin: "2px 0" }}>
      <div style={{ width: 1.5, height: 18, background: `linear-gradient(to bottom, ${color}44, ${color}88)` }} />
      <div style={{ width: 0, height: 0, borderLeft: "5px solid transparent", borderRight: "5px solid transparent", borderTop: `7px solid ${color}88` }} />
      {label && <span style={{ fontSize: 9, color: COLORS.dimText, marginTop: 3, fontFamily: "monospace", letterSpacing: "0.05em" }}>{label}</span>}
    </div>
  );
}

function HArrow({ color = COLORS.dimText }) {
  return (
    <div style={{ display: "flex", alignItems: "center", padding: "0 4px" }}>
      <div style={{ height: 1.5, width: 20, background: color + "88" }} />
      <div style={{ width: 0, height: 0, borderTop: "5px solid transparent", borderBottom: "5px solid transparent", borderLeft: `7px solid ${color}88` }} />
    </div>
  );
}

function Node({ title, subtitle, lines = [], style = NODE_STYLES.input, width = 160, badge, new: isNew, improved }) {
  const [hovered, setHovered] = useState(false);
  return (
    <div
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        background: hovered ? style.bg + "ee" : style.bg,
        border: `1px solid ${hovered ? style.accent : style.border}`,
        borderRadius: 8,
        padding: "10px 12px",
        width,
        minWidth: width,
        position: "relative",
        transition: "all 0.2s ease",
        boxShadow: hovered ? `0 0 16px ${style.accent}33` : "none",
        cursor: "default",
      }}
    >
      {isNew && (
        <div style={{ position: "absolute", top: -9, right: 8, background: COLORS.teal, color: "#000", fontSize: 8, fontWeight: 800, padding: "1px 6px", borderRadius: 10, fontFamily: "monospace", letterSpacing: "0.05em" }}>NEW</div>
      )}
      {improved && (
        <div style={{ position: "absolute", top: -9, right: 8, background: COLORS.amber, color: "#000", fontSize: 8, fontWeight: 800, padding: "1px 6px", borderRadius: 10, fontFamily: "monospace", letterSpacing: "0.05em" }}>IMPROVED</div>
      )}
      {badge && (
        <div style={{ position: "absolute", top: -9, left: 8, background: style.accent + "33", border: `1px solid ${style.accent}66`, color: style.accent, fontSize: 8, fontWeight: 700, padding: "1px 6px", borderRadius: 10, fontFamily: "monospace" }}>{badge}</div>
      )}
      <div style={{ fontSize: 11, fontWeight: 700, color: style.accent, fontFamily: "'Courier New', monospace", letterSpacing: "0.04em", marginBottom: 3 }}>{title}</div>
      {subtitle && <div style={{ fontSize: 9.5, color: COLORS.lightText, marginBottom: 4, fontFamily: "system-ui", lineHeight: 1.4 }}>{subtitle}</div>}
      {lines.map((l, i) => (
        <div key={i} style={{ fontSize: 8.5, color: COLORS.dimText, lineHeight: 1.5, fontFamily: "monospace" }}>· {l}</div>
      ))}
    </div>
  );
}

function SectionLabel({ children, color = COLORS.dimText, top = false }) {
  return (
    <div style={{ textAlign: "center", marginBottom: top ? 6 : 4, marginTop: top ? 0 : 2 }}>
      <span style={{ fontSize: 9, color, fontFamily: "monospace", letterSpacing: "0.12em", textTransform: "uppercase", background: COLORS.bg, padding: "0 8px" }}>
        {children}
      </span>
    </div>
  );
}

function PhaseBox({ label, color, children, dashed }) {
  return (
    <div style={{
      border: `1px ${dashed ? "dashed" : "solid"} ${color}44`,
      borderRadius: 12,
      padding: "12px 16px 14px",
      background: color + "08",
      position: "relative",
      marginBottom: 4,
    }}>
      <div style={{
        position: "absolute", top: -10, left: 16,
        background: COLORS.bg, padding: "0 8px",
        fontSize: 9, fontWeight: 700, color, fontFamily: "monospace",
        letterSpacing: "0.1em", textTransform: "uppercase",
      }}>{label}</div>
      {children}
    </div>
  );
}

function Legend() {
  const items = [
    { color: COLORS.teal, label: "New addition from Image 2" },
    { color: COLORS.amber, label: "Improved from Image 1" },
    { color: COLORS.blue, label: "Retained from Image 1" },
    { color: COLORS.red, label: "Safety / filter layer" },
  ];
  return (
    <div style={{ display: "flex", gap: 20, justifyContent: "center", marginBottom: 20, flexWrap: "wrap" }}>
      {items.map((it, i) => (
        <div key={i} style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{ width: 10, height: 10, borderRadius: 2, background: it.color }} />
          <span style={{ fontSize: 10, color: COLORS.gray, fontFamily: "monospace" }}>{it.label}</span>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [activeTooltip, setActiveTooltip] = useState(null);

  return (
    <div style={{
      background: COLORS.bg,
      minHeight: "100vh",
      padding: "32px 24px 48px",
      fontFamily: "system-ui, sans-serif",
      overflowX: "auto",
    }}>
      {/* Title */}
      <div style={{ textAlign: "center", marginBottom: 28 }}>
        <div style={{ fontSize: 11, color: COLORS.teal, fontFamily: "monospace", letterSpacing: "0.3em", marginBottom: 8 }}>REDROB HACKATHON · OPTIMIZED PIPELINE</div>
        <h1 style={{ fontSize: 22, fontWeight: 800, color: COLORS.lightText, margin: 0, letterSpacing: "-0.02em" }}>
          Intelligent Candidate Ranking System
        </h1>
        <div style={{ fontSize: 11, color: COLORS.dimText, marginTop: 6, fontFamily: "monospace" }}>
          Image 1 Constraints + Image 2 Intelligence · CPU-only · ≤5 min · No Network · 100K candidates
        </div>
      </div>

      <Legend />

      <div style={{ maxWidth: 1100, margin: "0 auto" }}>

        {/* ── INPUTS ── */}
        <SectionLabel color={COLORS.gray} top>inputs</SectionLabel>
        <div style={{ display: "flex", justifyContent: "center", gap: 40, marginBottom: 4 }}>
          <Node title="candidates.jsonl.gz" subtitle="100 000 profiles · 465 MB unzipped" lines={["profile · career_history · skills", "education · redrob_signals"]} style={NODE_STYLES.input} width={200} />
          <Node title="job_description.md" subtitle="Senior AI Engineer · Redrob AI" lines={["required skills · seniority signals", "location · culture · disqualifiers"]} style={NODE_STYLES.input} width={200} />
        </div>

        <Arrow color={COLORS.blue} />

        {/* ── PRE-COMPUTATION ── */}
        <PhaseBox label="pre-computation — offline · outside 5-min window" color={COLORS.teal}>

          {/* Row 1: Parsers */}
          <SectionLabel color={COLORS.teal}>parsing & understanding</SectionLabel>
          <div style={{ display: "flex", justifyContent: "center", gap: 16, marginBottom: 4 }}>
            <Node
              title="Candidate Parser"
              subtitle="load jsonl · normalize fields"
              lines={["build feature vectors per candidate", "flatten skill name+proficiency+duration", "extract company_size · industry flags", "detect consulting-only career patterns"]}
              style={NODE_STYLES.parser} width={210} improved
            />
            <Node
              title="JD Parser + Intent Extractor"
              subtitle="extract required / nice-to-have skills"
              lines={["weight tier: required×2 · optional×1", "encode JD → dense vector (MiniLM)", "extract seniority signals (5-9 yrs)", "extract disqualifier patterns (consulting)", "expand synonyms via ontology map"]}
              style={NODE_STYLES.parser} width={220} improved
            />
            <Node
              title="Ontology Builder"
              subtitle="JSON synonym + implication map"
              lines={["skill→synonyms (PyTorch↔TensorFlow)", "skill→co-skills (Pinecone→embeddings)", "domain transfer map (RecSys→IR)", "seniority adjacency graph"]}
              style={NODE_STYLES.expansion} width={190} isNew
            />
          </div>

          <Arrow color={COLORS.teal} label="build indexes" />

          {/* Row 2: Indexes */}
          <SectionLabel color={COLORS.blue}>precomputed indexes saved to disk</SectionLabel>
          <div style={{ display: "flex", justifyContent: "center", gap: 12, marginBottom: 4, flexWrap: "wrap" }}>
            <Node
              title="FAISS Index"
              subtitle="dense semantic embeddings"
              lines={["all-MiniLM-L6-v2 · 22MB", "IVF256 index for speed", "profile text + career desc encoded", "~200ms build · ~5ms query"]}
              style={NODE_STYLES.index} width={172}
            />
            <Node
              title="BM25 Index"
              subtitle="keyword inverted index"
              lines={["skill tokens + career text", "ontology-expanded queries", "catches sparse profiles", "exact match + synonym match"]}
              style={NODE_STYLES.index} width={172} improved
            />
            <Node
              title="Feature Store"
              subtitle="pre-scored signal vectors"
              lines={["23 behavioral signals normalized", "skill coverage per JD weight", "trajectory velocity score", "honeypot flag pre-tagged"]}
              style={NODE_STYLES.index} width={172}
            />
            <Node
              title="Trajectory DB"
              subtitle="career pattern index"
              lines={["promotions per year", "IC-riser pattern detection", "product-co vs services-co flag", "YOE band classification (5-9)"]}
              style={NODE_STYLES.index} width={172} isNew
            />
            <Node
              title="Honeypot Registry"
              subtitle="impossible profile flags"
              lines={["exp > company founding delta", "expert skill + 0 months duration", "title/description mismatch score", "pre-tagged · O(1) lookup"]}
              style={{ ...NODE_STYLES.filter, bg: "#1a1218" }} width={172} improved
            />
          </div>
        </PhaseBox>

        <Arrow color={COLORS.blue} label="≤ 5-min ranking window · CPU only · no network" />

        {/* ── RANKING WINDOW ── */}
        <PhaseBox label="ranking window — ≤ 5 minutes · cpu only · no network" color={COLORS.blue}>

          {/* 4 parallel paths */}
          <SectionLabel color={COLORS.purple}>five parallel retrieval paths (expanded from image 1's four)</SectionLabel>
          <div style={{ display: "flex", justifyContent: "center", gap: 10, marginBottom: 4, flexWrap: "wrap" }}>
            <Node
              title="Path 1: Semantic"
              subtitle="FAISS cosine similarity"
              lines={["top-25 by dense vector sim", "catches rich profile candidates", "JD vector vs profile vector", "MiniLM · CPU · ~5ms"]}
              style={NODE_STYLES.path} width={165} badge="dense"
            />
            <Node
              title="Path 2: Keyword"
              subtitle="BM25 + ontology expansion"
              lines={["top-25 exact + synonym match", "catches sparse profiles", "ontology expands query terms", "BM25 + skill token overlap"]}
              style={NODE_STYLES.path} width={165} badge="sparse" improved
            />
            <Node
              title="Path 3: Ontology Graph"
              subtitle="domain transfer traversal"
              lines={["top-20 via skill graph walk", "RecSys → IR domain transfer", "catches Tier-5 candidates", "adjacency map · in-memory"]}
              style={NODE_STYLES.path} width={165} badge="graph" isNew
            />
            <Node
              title="Path 4: Trajectory"
              subtitle="career pattern match"
              lines={["top-15 IC riser detection", "product-co background flag", "promotions/yr velocity", "YOE 5-9 band filter"]}
              style={NODE_STYLES.path} width={165} badge="career"
            />
            <Node
              title="Path 5: Signal"
              subtitle="behavioral engagement path"
              lines={["top-15 by signal strength", "open_to_work · last_active", "recruiter_response_rate", "github_activity_score"]}
              style={NODE_STYLES.path} width={165} badge="signals" isNew
            />
          </div>

          <Arrow color={COLORS.green} />

          {/* RRF */}
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 4 }}>
            <Node
              title="Reciprocal Rank Fusion (RRF)"
              subtitle="merge 5 paths · high in any path = survives"
              lines={["score = Σ 1/(60+rank) across all paths", "deduplication · unified top-60 list", "path 3+5 bonus weight for Tier-5 rescue", "~30ms · pure Python"]}
              style={NODE_STYLES.fusion} width={420} improved
            />
          </div>

          <Arrow color={COLORS.red} />

          {/* Honeypot filter */}
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 4 }}>
            <Node
              title="Honeypot Filter"
              subtitle="remove impossible profiles before expensive rerank"
              lines={[
                "exp at company > founding delta → flag",
                "expert proficiency + 0 months duration → flag",
                "title vs career description mismatch → flag",
                "salary min > max anomaly → flag",
                "O(1) registry lookup · removes before cross-encoder",
              ]}
              style={NODE_STYLES.filter} width={480} improved
            />
          </div>

          <Arrow color={COLORS.purple} label="top-50 survivors" />

          {/* Cross-encoder */}
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 4 }}>
            <Node
              title="Cross-Encoder Rerank (top 50)"
              subtitle="pairwise JD × profile · token-level interaction · no GPU needed"
              lines={[
                "cross-encoder/ms-marco-MiniLM-L-6-v2 · 80MB · CPU",
                "reads JD + candidate profile simultaneously",
                "catches semantic matches missed by bi-encoder",
                "50 × ~80ms = ~4s total · safe within budget",
              ]}
              style={{ ...NODE_STYLES.index, border: "#5a3aaa", bg: "#140f2a" }} width={520} improved
            />
          </div>

          <Arrow color={COLORS.blue} label="composite scoring" />

          {/* 3 scoring components */}
          <SectionLabel color={COLORS.blue}>composite score components</SectionLabel>
          <div style={{ display: "flex", justifyContent: "center", gap: 16, marginBottom: 4 }}>
            <Node
              title="Skill Match Score (×0.40)"
              subtitle="required weighted × 2 · nice-to-have × 1"
              lines={[
                "proficiency tier multiplier",
                "duration_months trust factor",
                "endorsement credibility boost",
                "assessment score if available",
                "ontology partial credit for adjacent skills",
              ]}
              style={NODE_STYLES.score} width={200} improved
            />
            <Node
              title="Career Quality Score (×0.35)"
              subtitle="product-co · YOE band · IC riser"
              lines={[
                "product-co vs services-co (TCS/Wipro penalty)",
                "YOE band match 5-9 years",
                "promotions/yr trajectory velocity",
                "no consulting-only career",
                "domain: food-tech · fintech · SaaS ok",
              ]}
              style={NODE_STYLES.score} width={200} improved
            />
            <Node
              title="Behavioral Multiplier (×0.25)"
              subtitle="availability · engagement · recency"
              lines={[
                "last_active_date recency decay e^(-λt)",
                "recruiter_response_rate",
                "notice_period ≤ 30d bonus",
                "open_to_work_flag",
                "github_activity_score",
                "profile_completeness_score",
              ]}
              style={NODE_STYLES.score} width={200} improved
            />
          </div>

          <Arrow color={COLORS.teal} />

          {/* Final composite */}
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 4 }}>
            <Node
              title="Final Composite Score"
              subtitle="0.40×skill + 0.35×career + 0.25×behavioral"
              lines={[
                "non-increasing score enforcement",
                "tie-break: candidate_id ascending (spec-compliant)",
                "uncertainty penalty × 0.7-1.0 for sparse profiles",
                "consulting-only hard penalty applied",
                "location bonus: Pune / Noida / Delhi NCR",
              ]}
              style={NODE_STYLES.composite} width={500} improved
            />
          </div>

          <Arrow color={COLORS.amber} />

          {/* Adversarial Trust Layer */}
          <PhaseBox label="adversarial trust layer — rule-based (no llm required)" color={COLORS.amber} dashed>
            <SectionLabel color={COLORS.amber}>from image 2 · advocate + skeptic verdict · fully rule-based</SectionLabel>
            <div style={{ display: "flex", justifyContent: "center", gap: 16, marginBottom: 8 }}>
              <Node
                title="Advocate Agent"
                subtitle="argues FOR this ranking"
                lines={[
                  "scan: matching required skills",
                  "scan: product-co trajectory",
                  "scan: assessment scores > 70",
                  "scan: recent activity signals",
                  "tag each: HIGH/MEDIUM/LOW confidence",
                ]}
                style={{ bg: "#0f2a1a", border: "#1a5a3a", accent: COLORS.green }} width={200} isNew
              />
              <Node
                title="Skeptic Agent"
                subtitle="argues AGAINST this ranking"
                lines={[
                  "scan: missing required skills",
                  "scan: consulting-only history",
                  "scan: last_active > 90 days",
                  "scan: notice_period > 60 days",
                  "tag each: HIGH/MODERATE/LOW risk",
                ]}
                style={{ bg: "#2a0f0f", border: "#5a1a1a", accent: COLORS.red }} width={200} isNew
              />
              <Node
                title="Verdict Synthesis"
                subtitle="ROBUST · CONTESTED · FRAGILE"
                lines={[
                  "merge advocate + skeptic signals",
                  "classify ranking confidence tier",
                  "generate falsifiability conditions",
                  "flip risk: LOW / MEDIUM / HIGH",
                ]}
                style={{ bg: "#2a1f0f", border: "#5a3a1a", accent: COLORS.amber }} width={200} isNew
              />
            </div>

            <Arrow color={COLORS.amber} />

            <div style={{ display: "flex", justifyContent: "center" }}>
              <Node
                title="Reasoning Generator"
                subtitle="template-based · actual profile facts · no hallucination · gap-aware"
                lines={[
                  "ADVOCATE facts → positive signals sentence",
                  "SKEPTIC risks → honest concerns sentence",
                  "VERDICT → ranking confidence label",
                  "falsifiability contract: 2 conditions that would flip rank",
                  "1-2 sentences per candidate · spec-compliant",
                ]}
                style={NODE_STYLES.trust} width={560} improved
              />
            </div>
          </PhaseBox>

        </PhaseBox>

        <Arrow color={COLORS.blue} />

        {/* Output */}
        <div style={{ display: "flex", justifyContent: "center" }}>
          <Node
            title="submission.csv"
            subtitle="top 100 · validated with validate_submission.py before upload"
            lines={[
              "candidate_id · rank · score · reasoning",
              "score non-increasing enforced",
              "tie-break by candidate_id asc",
              "honeypot rate < 10% verified",
            ]}
            style={NODE_STYLES.output} width={480}
          />
        </div>

        {/* Budget breakdown */}
        <div style={{ marginTop: 32, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: "16px 20px", background: COLORS.panel }}>
          <div style={{ fontSize: 10, color: COLORS.teal, fontFamily: "monospace", letterSpacing: "0.15em", marginBottom: 12 }}>RUNTIME BUDGET BREAKDOWN · 5-MINUTE WINDOW</div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {[
              { op: "Load FAISS index", t: "~2s", c: COLORS.blue },
              { op: "Load BM25 index", t: "~1s", c: COLORS.blue },
              { op: "Load feature store", t: "~5s", c: COLORS.blue },
              { op: "Encode JD query", t: "~0.1s", c: COLORS.teal },
              { op: "FAISS search (100K)", t: "~0.05s", c: COLORS.purple },
              { op: "BM25 retrieval", t: "~0.5s", c: COLORS.purple },
              { op: "Ontology traversal", t: "~0.2s", c: COLORS.purple },
              { op: "Trajectory lookup", t: "~0.5s", c: COLORS.purple },
              { op: "Signal path", t: "~0.3s", c: COLORS.purple },
              { op: "RRF fusion", t: "~0.05s", c: COLORS.green },
              { op: "Honeypot filter", t: "~0.01s", c: COLORS.red },
              { op: "Cross-encoder (50)", t: "~4s", c: COLORS.amber },
              { op: "Composite scoring", t: "~0.5s", c: COLORS.blue },
              { op: "Trust layer (top 100)", t: "~1s", c: COLORS.amber },
              { op: "CSV write", t: "~0.1s", c: COLORS.gray },
              { op: "Total estimate", t: "~15s", c: COLORS.teal },
            ].map((item, i) => (
              <div key={i} style={{
                background: COLORS.bg, border: `1px solid ${item.c}33`,
                borderRadius: 6, padding: "6px 10px",
                display: "flex", gap: 8, alignItems: "center",
              }}>
                <div style={{ width: 6, height: 6, borderRadius: "50%", background: item.c, flexShrink: 0 }} />
                <span style={{ fontSize: 9.5, color: COLORS.gray, fontFamily: "monospace" }}>{item.op}</span>
                <span style={{ fontSize: 10, color: item.c, fontFamily: "monospace", fontWeight: 700 }}>{item.t}</span>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 10, fontSize: 9, color: COLORS.dimText, fontFamily: "monospace" }}>
            * Pre-computation (embeddings, indexes, feature store) runs once offline. Well within 16GB RAM. No GPU. No network.
          </div>
        </div>

        {/* Key improvements table */}
        <div style={{ marginTop: 20, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: "16px 20px", background: COLORS.panel }}>
          <div style={{ fontSize: 10, color: COLORS.teal, fontFamily: "monospace", letterSpacing: "0.15em", marginBottom: 12 }}>KEY IMPROVEMENTS OVER IMAGE 1 · BORROWED FROM IMAGE 2</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {[
              { from: "4 retrieval paths", to: "5 paths: added signal-path as first-class retrieval", color: COLORS.teal },
              { from: "BM25 only keywords", to: "BM25 + ontology expansion catches domain-transfer candidates", color: COLORS.teal },
              { from: "No graph traversal", to: "Path 3: ontology graph walk for Tier-5 rescue (Image 2's key insight)", color: COLORS.teal },
              { from: "Top-200 cross-encoder", to: "Top-50 post-honeypot-filter (safer budget, higher quality pool)", color: COLORS.amber },
              { from: "Template reasoning only", to: "Advocate + Skeptic + Verdict → richer template (no LLM needed)", color: COLORS.teal },
              { from: "0.5 / 0.3 / 0.2 weights", to: "0.40 / 0.35 / 0.25 — career raised to match JD emphasis", color: COLORS.amber },
              { from: "Basic honeypot flag", to: "5-rule honeypot registry with O(1) lookup before cross-encoder", color: COLORS.amber },
              { from: "No consulting penalty", to: "Explicit TCS/Wipro/Infosys consulting-only hard penalty", color: COLORS.amber },
              { from: "No uncertainty handling", to: "Sparse profile uncertainty multiplier 0.7-1.0", color: COLORS.teal },
              { from: "No location scoring", to: "Location bonus for Pune/Noida/Delhi NCR per JD", color: COLORS.teal },
            ].map((row, i) => (
              <div key={i} style={{ display: "flex", gap: 8, padding: "8px 10px", background: COLORS.bg, borderRadius: 6, border: `1px solid ${COLORS.border}` }}>
                <div style={{ width: 3, background: row.color, borderRadius: 2, flexShrink: 0 }} />
                <div>
                  <div style={{ fontSize: 8.5, color: COLORS.dimText, fontFamily: "monospace", marginBottom: 2 }}>BEFORE: {row.from}</div>
                  <div style={{ fontSize: 9, color: COLORS.lightText, fontFamily: "monospace" }}>→ {row.to}</div>
                </div>
              </div>
            ))}
          </div>
        </div>

      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
